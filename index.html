ailhead.",tags:["Summit","Epic Views","Strenuous","Seasonal Closure"],conditions:"Good",conditionNote:"Summit trail open. No seasonal closure currently. Snow patches possible above 8,500 ft.",hours:"Sunrise to sunset",fee:"Colorado State Park pass required ($10/day)",sponsored:!1},{id:"t3",name:"Goldenrod Loop",park:"Fishers Peak State Park",difficulty:"Moderate",miles:5,elev:560,rating:4.6,reviews:98,lat:37.111303,lng:-104.519993,placeId:"ChIJ4z_kIIodEYcRmbV8I8xwi5g",desc:"A rewarding loop through juniper and pi\xF1on forest \u2014 one of Colorado's most scenic for its vegetation. Mule deer, wild turkey, and golden eagles are regularly spotted. Great introduction to the park without the full summit commitment.",directions:"From I-25 take Exit 11 east to County Road 69-3. Fishers Peak Trailhead parking lot.",tags:["Wildlife","Loop","Family","Bikers Welcome"],conditions:"Good",conditionNote:"Dry and clear. Wildflowers blooming now.",hours:"Sunrise to sunset",fee:"Colorado State Park pass required",sponsored:!1},{id:"t4",name:"Levsa Canyon Trail",park:"Trinidad Lake State Park",difficulty:"Moderate",miles:3,elev:400,rating:4.5,reviews:187,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",desc:"Winds through a beautiful canyon above Trinidad Lake with sweeping reservoir views. Features steep and rocky sections through pinyon-juniper woodland. Start from Carpios Ridge Campground for best access.",directions:"Hwy 12 west from Trinidad for 4 miles. Enter Trinidad Lake State Park, follow signs to Carpios Ridge Campground.",tags:["Lake Views","Rocky","Sturdy Shoes","Dog Friendly"],conditions:"Clear",conditionNote:"Trail in excellent condition. Some muddy patches near creek crossing.",hours:"6:00 AM \u2013 10:00 PM daily",fee:"$10/day or annual Colorado State Park pass",sponsored:!1},{id:"t5",name:"South Shore Trail",park:"Trinidad Lake State Park",difficulty:"Easy",miles:1,elev:80,rating:4.4,reviews:241,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",desc:"Paved, accessible trail along the south shore of Trinidad Lake. Perfect for families, strollers, and wheelchairs. Connects to the fishing pier and boat launch. Gorgeous sunrise views across the water to Fishers Peak.",directions:"Enter Trinidad Lake State Park off Hwy 12. Follow signs to the South Shore Day Use area.",tags:["ADA Accessible","Paved","Dog Friendly","Family","Fishing Access"],conditions:"Clear",conditionNote:"Fully accessible. New picnic tables installed near the pier.",hours:"6:00 AM \u2013 10:00 PM daily",fee:"$10/day day use fee",sponsored:!1},{id:"t6",name:"Purgatoire Riverwalk",park:"City of Trinidad",difficulty:"Easy",miles:2,elev:30,rating:5,reviews:3,lat:37.177524,lng:-104.492449,placeId:"ChIJuyF8YQAbEYcR3_HLLQMlGco",desc:"A scenic in-town trail following the Purgatoire River. Connects downtown Trinidad to historic Kit Carson Park. Trout fishing access at select spots along the banks. Great for a morning run or evening stroll with views of the downtown Victorian architecture.",directions:"Access from downtown Trinidad \u2014 look for trailhead signs near the river on Nevada Ave or W. Main St.",tags:["In Town","Fishing Access","Dog Friendly","Flat","Paved"],conditions:"Clear",conditionNote:"Trail open. River running clear.",hours:"Open daily, dawn to dusk",fee:"Free",sponsored:!1},{id:"t7",name:"Wormhole Loop",park:"City of Trinidad",difficulty:"Moderate",miles:2.9,elev:426,rating:4,reviews:303,lat:37.1735,lng:-104.518,placeId:null,desc:"A community-built high desert loop just minutes from downtown. The trail earns its name from unique rock formations that resemble wormhole entrances. The north section is sandy and flat with open views over the plains; the south loop gets chunkier with slickrock sections, optional drop lines, and a great view of Simpson's Rest and the city. Clockwise is the preferred direction for hikers and bikers alike.",directions:"Trailhead at the west end of Arch St, Trinidad. Also accessible via the Crossbed Trail behind the cemetery.",tags:["Dog Friendly","Bike Friendly","Trail Running","Loop","Wildflowers","City Views"],conditions:"Good",conditionNote:"Loose rocks and sandy corners \u2014 watch footing on the south loop. Limited shade, bring water.",hours:"Open daily, dawn to dusk",fee:"Free",sponsored:!1}],oo=[{id:"fi1",name:"Trinidad Lake",park:"Trinidad Lake State Park",type:"All Methods",access:"Shore, pier & boat",rating:4.6,reviews:312,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",species:["Rainbow Trout","Kokanee Salmon","Largemouth Bass","Walleye","Catfish"],regulation:"Standard Colorado regulations. Bag limit 4 trout. Boat fishing permitted \u2014 electric motors only in designated coves.",desc:"Trinidad's flagship fishing destination. The lake is stocked regularly and holds a healthy population of kokanee salmon in addition to trout. Boat rentals available at the marina. Ice fishing popular in winter.",license:"Colorado fishing license required. Purchase online at cpw.state.co.us or at Trinidad Lake State Park, 32610 Highway 12, Trinidad, CO 81082.",hours:"6:00 AM \u2013 10:00 PM daily",fee:"$10 state park day use fee",sponsored:!1},{id:"fi2",name:"Purgatoire River \u2014 Downtown",park:"City of Trinidad",type:"Fly & Spin",access:"Walk-in along Riverwalk",rating:4.4,reviews:89,lat:37.177524,lng:-104.492449,placeId:"ChIJuyF8YQAbEYcR3_HLLQMlGco",species:["Brown Trout","Rainbow Trout"],regulation:"Standard Colorado regs. Several catch-and-release only sections \u2014 check CPW maps for exact boundaries.",desc:"The Purgatoire River runs right through downtown Trinidad with several public fishing access points along the Riverwalk. Surprisingly productive trout water just steps from Main Street coffee shops.",license:"Colorado fishing license required.",hours:"Dawn to dusk",fee:"Free \u2014 public access",sponsored:!1},{id:"fi3",name:"Carpios Ridge Fishing Ponds",park:"Trinidad Lake State Park",type:"Still Water",access:"Walk-in, shore fishing",rating:4.5,reviews:56,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",species:["Rainbow Trout","Bluegill"],regulation:"Family-friendly ponds. Standard Colorado regulations.",desc:"Small, accessible ponds within the campground area \u2014 ideal for kids and beginners. Usually stocked in spring. Great spot to teach young anglers without the crowds of the main lake.",license:"Colorado fishing license required (kids 15 and under fish free).",hours:"6:00 AM \u2013 10:00 PM",fee:"State park pass required",sponsored:!1}],lo=[{id:"h1",name:"Trinidad History Museum",type:"Museum Complex",rating:4.3,reviews:161,lat:37.169067,lng:-104.50278,placeId:"ChIJnawzxmMbEYcRHgO9-r_FTeY",duration:"1.5\u20132 hrs",desc:"An entire city block of history. Four buildings including the 1882 Bloom Mansion (Second Empire architecture), the 1873 adobe Baca House, the Barglow Building, and the Santa Fe Trail Museum. The Baca-Bloom Heritage Garden features Victorian roses and native plants.",hours:"Tue\u2013Sat 10am\u20134pm",admission:"Adults $8 / Seniors $6 / Kids under 12 free",highlight:"Guided tours of the Baca House daily at 11am & 1pm. 'Children of Ludlow' exhibit on the 1913 Coalfield Strike is extraordinary.",address:"120 S. Chestnut St, Trinidad, CO 81082",phone:"719-846-7217",sponsored:!1},{id:"h2",name:"A.R. Mitchell Museum of Western Art",type:"Art Museum",rating:4.8,reviews:92,lat:37.16862,lng:-104.504512,placeId:"ChIJgWpGAWMbEYcRBbrFjV31mDM",duration:"45 min\u20131.5 hrs",desc:"A genuine hidden gem. Devoted to Arthur Roy Mitchell, Trinidad-born illustrator of 1930s\u201350s Western pulp magazines. Original studio preserved. Also features Harvey Dunn works, Native American textiles, local contemporary artists, and rotating exhibits. Building itself is stunning.",hours:"Tue\u2013Sat 10am\u20134pm",admission:"Free (donations welcome)",highlight:"Mitchell's original studio \u2014 preserved exactly as he left it. The tumbleweed ceiling installation is unforgettable.",address:"150 E. Main St, Trinidad, CO 81082",phone:"719-846-4224",sponsored:!1},{id:"h3",name:"Cokedale Historic District",type:"Ghost Town / Walking Tour",rating:4.6,reviews:74,lat:37.161,lng:-104.653,placeId:null,duration:"1\u20132 hrs",desc:"Just 10 miles west on the scenic Highway of Legends, Cokedale is a remarkably preserved 1900s coal-coke company town. Rows of original miner cottages still stand. The coke ovens \u2014 where coal was processed \u2014 line the canyon wall. A Colorado ghost town that never fully emptied.",hours:"Open 24/7 (outdoor, self-guided)",admission:"Free",highlight:"Over 350 original coke ovens visible from the road. One of the most intact examples of Colorado's coal era.",address:"Cokedale, CO \u2014 Hwy 12 west of Trinidad",phone:null,sponsored:!1},{id:"h4",name:"Downtown Trinidad Historic District",type:"Self-Guided Walking Tour",rating:4.7,reviews:203,lat:37.16873,lng:-104.50332,placeId:null,duration:"45 min\u20131.5 hrs",desc:"One of Colorado's most intact Victorian-era downtowns. Red brick streets, 19th-century commercial buildings, the 1883 Columbian Hotel, Trinidad Steam Engine 638, and the ornate Las Animas County Courthouse. The Santa Fe Trail passed right through here.",hours:"Open daily (outdoor)",admission:"Free",highlight:"Pick up a walking tour map at the Colorado Welcome Center (309 Nevada Ave). Don't miss the Main St. murals and Corazon Gallery.",address:"Main St & Commercial St, Trinidad, CO",phone:null,sponsored:!1},{id:"h5",name:"Ludlow Massacre Memorial",type:"Historic Site",rating:4.8,reviews:118,lat:37.351,lng:-104.611,placeId:null,duration:"30\u201345 min",desc:"18 miles north on I-25, this National Historic Landmark marks the site of the 1914 Ludlow Massacre \u2014 one of the darkest events in American labor history. Colorado National Guard and mine guards attacked a tent colony of 1,200 striking miners and families. A moving and important site.",hours:"Open daily (outdoor)",admission:"Free",highlight:"The monument and cellar where 11 children and 2 women suffocated in the fire. A solemn and necessary visit.",address:"Ludlow, CO 81052 (I-25 Exit 27)",phone:null,sponsored:!1}],so=[{id:"e1",name:"Santa Fe Trail Days",date:"June 27\u201329, 2026",location:"Downtown Trinidad",category:"Heritage Festival",rating:4.8,reviews:312,desc:"Annual celebration of Trinidad's role as a key stop on the historic Santa Fe Trail. Three days of living history demonstrations, pioneer crafts, trail wagon tours, music, food vendors, and a parade down Main Street.",admission:"Free",highlight:"Wagon train re-enactment through downtown Saturday afternoon. Kids' frontier skills workshops all weekend.",sponsored:!1},{id:"e2",name:"Trinidaddio Blues Fest",date:"August 1\u20133, 2026",location:"Kit Carson Park",category:"Music Festival",rating:4.9,reviews:487,desc:"The region's premier blues music event, held in historic Kit Carson Park along the Purgatoire River. Regional and national acts on two stages. Food trucks, craft vendors, beer garden. One of southern Colorado's most beloved summer traditions.",admission:"$20/day \xB7 $45/weekend",highlight:"Saturday evening headliner on the main stage. Bring a lawn chair or blanket \u2014 the park fills up.",sponsored:!0,sponsorName:"Colorado Welcome Center",sponsorDeal:"Show app for discounted wristband at the gate"},{id:"e3",name:"Spanish Peaks Music Festival",date:"August 22\u201324, 2026",location:"Trinidad Lake State Park",category:"Music & Outdoors",rating:4.7,reviews:198,desc:"Bluegrass, folk, and Americana music set against the backdrop of Trinidad Lake and the Spanish Peaks. Camp on-site, fish in the morning, and catch live music in the evenings. A uniquely Colorado experience.",admission:"$30/day \xB7 $75/weekend (camping included)",highlight:"Sunset jam sessions Friday and Saturday at the lake overlook. Always a spontaneous highlight.",sponsored:!1},{id:"e4",name:"First Friday Art Night",date:"Every first Friday",location:"Trinidad History Mu
