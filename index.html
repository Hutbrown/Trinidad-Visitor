conditionNote:"Trail open. River running clear.",hours:"Open daily, dawn to dusk",fee:"Free",sponsored:!1},{id:"t7",name:"Wormhole Loop",park:"City of Trinidad",difficulty:"Moderate",miles:2.9,elev:426,rating:4,reviews:303,lat:37.1735,lng:-104.518,placeId:null,desc:"A community-built high desert loop just minutes from downtown. The trail earns its name from unique rock formations that resemble wormhole entrances. The north section is sandy and flat with open views over the plains; the south loop gets chunkier with slickrock sections, optional drop lines, and a great view of Simpson's Rest and the city. Clockwise is the preferred direction for hikers and bikers alike.",directions:"Trailhead at the west end of Arch St, Trinidad. Also accessible via the Crossbed Trail behind the cemetery.",tags:["Dog Friendly","Bike Friendly","Trail Running","Loop","Wildflowers","City Views"],conditions:"Good",conditionNote:"Loose rocks and sandy corners \u2014 watch footing on the south loop. Limited shade, bring water.",hours:"Open daily, dawn to dusk",fee:"Free",sponsored:!1}],xo=[{id:"fi1",name:"Trinidad Lake",park:"Trinidad Lake State Park",type:"All Methods",access:"Shore, pier & boat",rating:4.6,reviews:312,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",species:["Rainbow Trout","Kokanee Salmon","Largemouth Bass","Walleye","Catfish"],regulation:"Standard Colorado regulations. Bag limit 4 trout. Boat fishing permitted \u2014 electric motors only in designated coves.",desc:"Trinidad's flagship fishing destination. The lake is stocked regularly and holds a healthy population of kokanee salmon in addition to trout. Boat rentals available at the marina. Ice fishing popular in winter.",license:"Colorado fishing license required. Purchase online at cpw.state.co.us or at Trinidad Lake State Park, 32610 Highway 12, Trinidad, CO 81082.",hours:"6:00 AM \u2013 10:00 PM daily",fee:"$10 state park day use fee",sponsored:!1},{id:"fi2",name:"Purgatoire River \u2014 Downtown",park:"City of Trinidad",type:"Fly & Spin",access:"Walk-in along Riverwalk",rating:4.4,reviews:89,lat:37.177524,lng:-104.492449,placeId:"ChIJuyF8YQAbEYcR3_HLLQMlGco",species:["Brown Trout","Rainbow Trout"],regulation:"Standard Colorado regs. Several catch-and-release only sections \u2014 check CPW maps for exact boundaries.",desc:"The Purgatoire River runs right through downtown Trinidad with several public fishing access points along the Riverwalk. Surprisingly productive trout water just steps from Main Street coffee shops.",license:"Colorado fishing license required.",hours:"Dawn to dusk",fee:"Free \u2014 public access",sponsored:!1},{id:"fi3",name:"Carpios Ridge Fishing Ponds",park:"Trinidad Lake State Park",type:"Still Water",access:"Walk-in, shore fishing",rating:4.5,reviews:56,lat:37.13966,lng:-104.579833,placeId:"ChIJnQOc2QMcEYcRymDQUzWtTkk",species:["Rainbow Trout","Bluegill"],regulation:"Family-friendly ponds. Standard Colorado regulations.",desc:"Small, accessible ponds within the campground area \u2014 ideal for kids and beginners. Usually stocked in spring. Great spot to teach young anglers without the crowds of the main lake.",license:"Colorado fishing license required (kids 15 and under fish free).",hours:"6:00 AM \u2013 10:00 PM",fee:"State park pass required",sponsored:!1}],zo=[{id:"h1",name:"Trinidad History Museum",type:"Museum Complex",rating:4.3,reviews:161,lat:37.169067,lng:-104.50278,placeId:"ChIJnawzxmMbEYcRHgO9-r_FTeY",duration:"1.5\u20132 hrs",desc:"An entire city block of history. Four buildings including the 1882 Bloom Mansion (Second Empire architecture), the 1873 adobe Baca House, the Barglow Building, and the Santa Fe Trail Museum. The Baca-Bloom Heritage Garden features Victorian roses and native plants.",hours:"Tue\u2013Sat 10am\u20134pm",admission:"Adults $8 / Seniors $6 / Kids under 12 free",highlight:"Guided tours of the Baca House daily at 11am & 1pm. 'Children of Ludlow' exhibit on the 1913 Coalfield Strike is extraordinary.",address:"120 S. Chestnut St, Trinidad, CO 81082",phone:"719-846-7217",sponsored:!1},{id:"h2",name:"A.R. Mitchell Museum of Western Art",type:"Art Museum",rating:4.8,reviews:92,lat:37.16862,lng:-104.504512,placeId:"ChIJgWpGAWMbEYcRBbrFjV31mDM",duration:"45 min\u20131.5 hrs",desc:"A genuine hidden gem. Devoted to Arthur Roy Mitchell, Trinidad-born illustrator of 1930s\u201350s Western pulp magazines. Original studio preserved. Also features Harvey Dunn works, Native American textiles, local contemporary artists, and rotating exhibits. Building itself is stunning.",hours:"Tue\u2013Sat 10am\u20134pm",admission:"Free (donations welcome)",highlight:"Mitchell's original studio \u2014 preserved exactly as he left it. The tumbleweed ceiling installation is unforgettable.",address:"150 E. Main St, Trinidad, CO 81082",phone:"719-846-4224",sponsored:!1},{id:"h3",name:"Cokedale Historic District",type:"Ghost Town / Walking Tour",rating:4.6,reviews:74,lat:37.161,lng:-104.653,placeId:null,duration:"1\u20132 hrs",desc:"Just 10 miles west on the scenic Highway of Legends, Cokedale is a remarkably preserved 1900s coal-coke company town. Rows of original miner cottages still stand. The coke ovens \u2014 where coal was processed \u2014 line the canyon wall. A Colorado ghost town that never fully emptied.",hours:"Open 24/7 (outdoor, self-guided)",admission:"Free",highlight:"Over 350 original coke ovens visible from the road. One of the most intact examples of Colorado's coal era.",address:"Cokedale, CO \u2014 Hwy 12 west of Trinidad",phone:null,sponsored:!1},{id:"h4",name:"Downtown Trinidad Historic District",type:"Self-Guided Walking Tour",rating:4.7,reviews:203,lat:37.16873,lng:-104.50332,placeId:null,duration:"45 min\u20131.5 hrs",desc:"One of Colorado's most intact Victorian-era downtowns. Red brick streets, 19th-century commercial buildings, the 1883 Columbian Hotel, Trinidad Steam Engine 638, and the ornate Las Animas County Courthouse. The Santa Fe Trail passed right through here.",hours:"Open daily (outdoor)",admission:"Free",highlight:"Pick up a walking tour map at the Colorado Welcome Center (309 Nevada Ave). Don't miss the Main St. murals and Corazon Gallery.",address:"Main St & Commercial St, Trinidad, CO",phone:null,sponsored:!1},{id:"h5",name:"Ludlow Massacre Memorial",type:"Historic Site",rating:4.8,reviews:118,lat:37.351,lng:-104.611,placeId:null,duration:"30\u201345 min",desc:"18 miles north on I-25, this National Historic Landmark marks the site of the 1914 Ludlow Massacre \u2014 one of the darkest events in American labor history. Colorado National Guard and mine guards attacked a tent colony of 1,200 striking miners and families. A moving and important site.",hours:"Open daily (outdoor)",admission:"Free",highlight:"The monument and cellar where 11 children and 2 women suffocated in the fire. A solemn and necessary visit.",address:"Ludlow, CO 81052 (I-25 Exit 27)",phone:null,sponsored:!1}],To=[{id:"e1",name:"Santa Fe Trail Days",date:"June 27\u201329, 2026",location:"Downtown Trinidad",category:"Heritage Festival",rating:4.8,reviews:312,desc:"Annual celebration of Trinidad's role as a key stop on the historic Santa Fe Trail. Three days of living history demonstrations, pioneer crafts, trail wagon tours, music, food vendors, and a parade down Main Street.",admission:"Free",highlight:"Wagon train re-enactment through downtown Saturday afternoon. Kids' frontier skills workshops all weekend.",sponsored:!1},{id:"e2",name:"Trinidaddio Blues Fest",date:"August 1\u20133, 2026",location:"Kit Carson Park",category:"Music Festival",rating:4.9,reviews:487,desc:"The region's premier blues music event, held in historic Kit Carson Park along the Purgatoire River. Regional and national acts on two stages. Food trucks, craft vendors, beer garden. One of southern Colorado's most beloved summer traditions.",admission:"$20/day \xB7 $45/weekend",highlight:"Saturday evening headliner on the main stage. Bring a lawn chair or blanket \u2014 the park fills up.",sponsored:!0,sponsorName:"Colorado Welcome Center",sponsorDeal:"Show app for discounted wristband at the gate"},{id:"e3",name:"Spanish Peaks Music Festival",date:"August 22\u201324, 2026",location:"Trinidad Lake State Park",category:"Music & Outdoors",rating:4.7,reviews:198,desc:"Bluegrass, folk, and Americana music set against the backdrop of Trinidad Lake and the Spanish Peaks. Camp on-site, fish in the morning, and catch live music in the evenings. A uniquely Colorado experience.",admission:"$30/day \xB7 $75/weekend (camping included)",highlight:"Sunset jam sessions Friday and Saturday at the lake overlook. Always a spontaneous highlight.",sponsored:!1},{id:"e4",name:"First Friday Art Night",date:"Every first Friday",location:"Trinidad History Museum & Downtown",category:"Arts & Culture",rating:4.6,reviews:134,desc:"Monthly art evening hosted by the Trinidad History Museum at Bloom House. Local galleries, food, music, and a chance to meet Trinidad's growing community of artists. The creative district has exploded in recent years.",admission:"Free",highlight:"Corazon Gallery and A.R. Mitchell Museum often have special openings the same evening.",sponsored:!1},{id:"e5",name:"Trinidad Polar Plunge",date:"February 14, 2027",location:"Trinidad Lake State Park",category:"Community Event",rating:4.5,reviews:89,desc:"Annual Valentine's Day polar plunge into Trinidad Lake to benefit Special Olympics Colorado. Open to everyone \u2014 costumes encouraged. One of the most memorable cold-weather traditions in the region.",admission:"Minimum fundraising pledge \u2014 see specialolympicsco.org",highlight:"Costume contest before the plunge. Past themes have included 'frozen sweethearts' and 'Cupid's frozen army.'",sponsored:!1}],Ao=[{id:"es1",type:"Hotel",name:"The Well Hotel & Taproom",category:"Boutique Hotel",rating:4.8,priceLevel:"$$$",desc:"The only downtown Trinidad hotel \u2014 on Main Street, walking distance to the A.R. Mitchell Museum, History Museum, restaurants, and the Riverwalk. The taproom features local craft beer. Views of Fishers Peak from upper rooms.",hours:"Check-in 3pm",address:"Main St, Trinidad, CO 81082",sponsored:!0,sponsorName:"The Well Hotel",deal:"Mention the app for a complimentary taproom welcome drink"},{id:"es2",type:"B&B",name:"Tarabino Inn",category:"Bed & Breakfast",rating:4.9,priceLevel:"$$",desc:"Restored Old English-style home in the heart of Trinidad's historic district. 5 rooms, complimentary breakfast 7\u20139am, library, garden terrace. Rated 9.2/10. Within a 5-minute walk of both the History Museum and A.R. Mitchell.",hours:"Check-in 3pm\u20137pm",address:"310 E. 2nd St, Trinidad, CO 81082",sponsored:!1},{id:"es3",type:"Camping",name:"Carpios Ridge Campground",category:"RV & Tent Camping",rating:4.6,priceLevel:"$",desc:"73 sites at Trinidad Lake State Park. Electric hookups at 35 sites. Showers, laundry, group shelters, playground, and direct trail access. One of southern Colorado's best family campgrounds.",hours:"Open year-round",address:"Trinidad Lake State Park, 32610 CO-12",sponsored:!1},{id:"es4",type:"Restaurant",name:"Sunset Bar & Grille",category:"Fine Dining",rating:4.6,priceLevel:"$$$",desc:"Fine dining overlooking the Purgatoire River Valley. Seasonal Colorado cuisine, locally sourced ingredients, full bar. Popular for sunset dinners. Trinidad's top special-occasion restaurant.",hours:"Wed\u2013Sun 5pm\u20139pm",address:"Trinidad, CO",sponsored:!1},{id:"es5",type:"Restaurant",name:"Trinidad Coffee Co.",category:"Caf\xE9 / Breakfast",rating:4.7,priceLevel:"$",desc:"Best coffee in southern Colorado by a wide margin. House-roasted beans, killer breakfast burritos, and an eclectic local crowd. Trail-ready to-go lunches available.",hours:"Daily 6am\u20132pm",address:"Main St, Trinidad, CO",sponsored:!0,sponsorName:"Trinidad Coffee Co.",deal:"Free pastry with any drink \u2014 show this app"},{id:"es6",type:"Restaurant",name:"Nana & Nano's Bistro",category:"Italian / American",rating:4
